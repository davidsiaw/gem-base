name: lint

'on':
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

permissions:
  contents: read

'on':
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true
    - name: script
      run: bundle exec rubocop
